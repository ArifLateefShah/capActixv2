<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cap Actix</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
/* ─────────────────────────────────────────────────────────────
   DESIGN TOKENS
───────────────────────────────────────────────────────────── */
:root {
  --bg0: #ffffff;
  --bg1: #f8fbff;
  --bg2: #f4f9ff;
  --bg-info:    #E6F1FB;
  --bg-success: #EAF3DE;
  --bg-warning: #FAEEDA;
  --bg-danger:  #FCEBEB;
  --tx0: #1a1a1a;
  --tx1: #555555;
  --tx2: #888888;
  --tx-info:    #003459;
  --tx-success: #27500A;
  --tx-warning: #633806;
  --tx-danger:  #791F1F;
  --bd:  rgba(0,0,0,0.10);
  --bd2: rgba(0,0,0,0.20);
  --blue:  #2857ce;
  --blue2: #003459;
  --green: #3B6D11;
  --amber: #854F0B;
  --red:   #A32D2D;
  --r-md: 8px;
  --r-lg: 12px;
  --r-xl: 16px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
  --shadow-md: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
}
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
html, body { height:100%; }
body { font-family:var(--font); background:var(--bg2); color:var(--tx0); font-size:13px; line-height:1.5; }

/* ─────────────────────────────────────────────────────────────
   EMAIL GATE OVERLAY
───────────────────────────────────────────────────────────── */
#emailGate {
  position:fixed; inset:0;
  background: linear-gradient(135deg, #f0f6ff 0%, #e8f2fb 100%);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:32px 16px;
  z-index:1000;
}
.gate-logo { text-align:center; margin-bottom:36px; }
.gate-logo h1 { font-size:30px; font-weight:800; color:var(--blue2); letter-spacing:-0.03em; }
.gate-logo h1 span { color:var(--blue); }
.gate-logo p { font-size:13px; color:var(--tx2); margin-top:6px; }

.email-form {
  background:var(--bg0);
  border:1px solid var(--bd);
  border-radius:var(--r-xl);
  padding:32px;
  width:100%; max-width:420px;
  box-shadow:var(--shadow-lg);
}
.email-form h2 { font-size:18px; font-weight:700; margin-bottom:8px; color:var(--tx0); text-align:center; }
.email-form .sub { font-size:13px; color:var(--tx1); margin-bottom:24px; text-align:center; }
.form-group { margin-bottom:18px; }
.form-label { display:block; font-size:12px; font-weight:600; color:var(--tx1); margin-bottom:5px; }
.form-req { color:var(--red); }
.gate-input {
  width:100%; padding:12px 14px;
  font-size:14px; font-family:var(--font);
  border:1.5px solid rgba(0,0,0,.15);
  border-radius:var(--r-md);
  background:var(--bg0); color:var(--tx0);
  transition:border-color .15s, box-shadow .15s;
}
.gate-input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(40,87,206,.09); }
.gate-input.error { border-color:var(--red); }
.form-hint { font-size:11px; color:var(--tx2); margin-top:6px; }
.form-error { font-size:11px; color:var(--red); margin-top:6px; display:none; }
.submit-btn {
  width:100%; padding:13px;
  font-size:14px; font-weight:600;
  border-radius:var(--r-md); cursor:pointer;
  font-family:var(--font);
  border:1px solid var(--blue);
  background:var(--blue); color:#fff;
  transition:all .15s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.submit-btn:hover:not(:disabled) { background:var(--blue2); transform:translateY(-1px); box-shadow:var(--shadow-md); }
.submit-btn:disabled { opacity:.6; cursor:not-allowed; }

.gate-spinner {
  width:16px; height:16px;
  border:2px solid rgba(255,255,255,.4);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .6s linear infinite;
  display:none;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ─────────────────────────────────────────────────────────────
   LOGIN / ROLE SELECTION
───────────────────────────────────────────────────────────── */
#loginPage {
  min-height:100vh;
  background: linear-gradient(135deg, #f0f6ff 0%, #e8f2fb 100%);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  padding:32px 16px;
}
.login-logo { text-align:center; margin-bottom:36px; }
.login-logo h1 { font-size:30px; font-weight:800; color:var(--blue2); letter-spacing:-0.03em; }
.login-logo h1 span { color:var(--blue); }
.login-logo p { font-size:13px; color:var(--tx2); margin-top:6px; }

/* Email badge shown on login page */
.user-email-badge {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--bg-info); color:var(--tx-info);
  border:0.5px solid #a8c8ef;
  padding:5px 12px; border-radius:20px;
  font-size:12px; font-weight:600; margin-top:10px;
}

.role-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px; width:100%; max-width:820px;
}
@media(max-width:600px){ .role-grid{grid-template-columns:1fr;} }

.role-card {
  background:var(--bg0);
  border:1px solid var(--bd);
  border-radius:var(--r-xl);
  padding:24px 22px;
  cursor:pointer; transition:all .18s;
  box-shadow:var(--shadow-sm);
  display:flex; gap:16px; align-items:flex-start;
  position:relative; overflow:hidden;
}
.role-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  border-radius:var(--r-xl) var(--r-xl) 0 0;
}
.role-card.gov::before  { background:var(--blue); }
.role-card.mfr::before  { background:var(--green); }
.role-card.ph::before   { background:var(--amber); }
.role-card.pub::before  { background:var(--tx2); }
.role-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-lg); border-color:var(--blue); }
.role-card-icon {
  width:48px; height:48px; border-radius:var(--r-md);
  display:flex; align-items:center; justify-content:center;
  font-size:22px; flex-shrink:0;
}
.role-card h3 { font-size:15px; font-weight:700; margin-bottom:4px; }
.role-card p  { font-size:12px; color:var(--tx1); line-height:1.55; }
.role-card .tag-row { display:flex; flex-wrap:wrap; gap:4px; margin-top:10px; }
.tag {
  font-size:10px; font-weight:600;
  padding:2px 8px; border-radius:10px; display:inline-block;
}

/* ─────────────────────────────────────────────────────────────
   APP SHELL
───────────────────────────────────────────────────────────── */
#appShell { display:none; height:100vh; flex-direction:column; overflow:hidden; }

.topbar {
  background:var(--bg0); border-bottom:0.5px solid var(--bd);
  height:52px; flex-shrink:0;
  display:flex; align-items:center; padding:0 24px; gap:16px;
  box-shadow:var(--shadow-sm); z-index:20;
}
.topbar-brand { font-size:18px; font-weight:800; color:var(--blue2); letter-spacing:-0.02em; flex-shrink:0; }
.topbar-brand span { color:var(--blue); }

.topbar-nav { display:flex; align-items:center; gap:2px; flex:1; overflow-x:auto; scrollbar-width:none; }
.topbar-nav::-webkit-scrollbar { display:none; }
.tnav-item {
  display:flex; align-items:center; gap:6px; padding:6px 14px;
  font-size:13px; font-weight:500; color:var(--tx1);
  border-radius:var(--r-md); cursor:pointer; white-space:nowrap;
  transition:all .15s; border:none; background:none; font-family:var(--font);
  position:relative;
}
.tnav-item:hover { background:var(--bg1); color:var(--tx0); }
.tnav-item.active { background:var(--bg-info); color:var(--blue2); font-weight:600; }
.tnav-item.active::after {
  content:''; position:absolute; bottom:-14px; left:50%; transform:translateX(-50%);
  width:28px; height:3px; background:var(--blue); border-radius:2px 2px 0 0;
}
.tnav-icon { font-size:14px; }

.topbar-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.user-chip {
  display:flex; align-items:center; gap:8px;
  padding:4px 12px 4px 5px; border:0.5px solid var(--bd);
  border-radius:24px; background:var(--bg1);
  cursor:pointer; transition:all .15s;
}
.user-chip:hover { background:var(--bg2); box-shadow:var(--shadow-sm); }
.uc-avatar { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; }
.uc-info { line-height:1.3; }
.uc-name { font-size:11px; font-weight:600; color:var(--tx0); }
.uc-role { font-size:10px; font-weight:600; }
.uc-caret { font-size:9px; color:var(--tx2); }

.app-body { display:flex; flex:1; overflow:hidden; }
.content { flex:1; overflow-y:auto; padding:24px; background:var(--bg2); }

/* ─────────────────────────────────────────────────────────────
   VIEWS
───────────────────────────────────────────────────────────── */
.view { display:none; animation:fadeUp .22s ease; }
.view.active { display:block; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }

.page-title { font-size:20px; font-weight:700; color:var(--tx0); margin-bottom:4px; }
.page-sub   { font-size:13px; color:var(--tx1); margin-bottom:20px; }

/* ─────────────────────────────────────────────────────────────
   KPI
───────────────────────────────────────────────────────────── */
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:14px; margin-bottom:24px; }
.kpi { background:var(--bg0); border:0.5px solid var(--bd); border-radius:var(--r-lg); padding:18px 20px; box-shadow:var(--shadow-sm); position:relative; overflow:hidden; }
.kpi::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
.kpi.k-blue::before  { background:var(--blue); }
.kpi.k-green::before { background:var(--green); }
.kpi.k-amber::before { background:var(--amber); }
.kpi.k-red::before   { background:var(--red); }
.kpi-icon  { font-size:20px; margin-bottom:8px; }
.kpi-label { font-size:11px; font-weight:600; color:var(--tx2); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
.kpi-value { font-size:28px; font-weight:700; line-height:1; }
.kpi.k-blue  .kpi-value { color:var(--blue); }
.kpi.k-green .kpi-value { color:var(--green); }
.kpi.k-amber .kpi-value { color:var(--amber); }
.kpi.k-red   .kpi-value { color:var(--red); }
.kpi-sub { font-size:11px; color:var(--tx2); margin-top:4px; }

/* ─────────────────────────────────────────────────────────────
   CARD
───────────────────────────────────────────────────────────── */
.card { background:var(--bg0); border:0.5px solid var(--bd); border-radius:var(--r-lg); margin-bottom:20px; overflow:hidden; box-shadow:var(--shadow-sm); transition:box-shadow .18s; }
.card:hover { box-shadow:var(--shadow-md); }
.card-head { padding:13px 20px; border-bottom:0.5px solid var(--bd); display:flex; align-items:center; justify-content:space-between; background:var(--bg1); }
.card-head h2 { font-size:14px; font-weight:700; display:flex; align-items:center; gap:8px; }
.card-head-actions { display:flex; gap:8px; align-items:center; }
.card-body { padding:20px; }

/* ─────────────────────────────────────────────────────────────
   TABLE
───────────────────────────────────────────────────────────── */
.table { width:100%; border-collapse:collapse; font-size:13px; }
.table th { padding:10px 14px; text-align:left; font-size:11px; font-weight:700; color:var(--tx2); text-transform:uppercase; letter-spacing:.04em; border-bottom:1px solid var(--bd); background:var(--bg1); white-space:nowrap; }
.table td { padding:12px 14px; border-bottom:0.5px solid var(--bd); color:var(--tx0); vertical-align:middle; }
.table tr:last-child td { border-bottom:none; }
.table tr:hover td { background:var(--bg1); }
.table .actions { display:flex; gap:6px; }
.table-empty td { text-align:center; padding:32px; color:var(--tx2); font-style:italic; }

/* ─────────────────────────────────────────────────────────────
   PILLS
───────────────────────────────────────────────────────────── */
.pill { display:inline-block; padding:3px 9px; border-radius:12px; font-size:11px; font-weight:600; }
.p-active, .p-valid, .p-available { background:var(--bg-success); color:var(--tx-success); }
.p-pending, .p-expiring           { background:var(--bg-warning);  color:var(--tx-warning); }
.p-revoked, .p-expired, .p-error  { background:var(--bg-danger);   color:var(--tx-danger);  }
.p-info, .p-transferred           { background:var(--bg-info);     color:var(--tx-info);    }
.p-dispensed                      { background:var(--bg-info);     color:var(--tx-info);    }
.p-draft, .p-stock                { background:#f0efea; color:#555; }

/* ─────────────────────────────────────────────────────────────
   BUTTONS
───────────────────────────────────────────────────────────── */
.btn { display:inline-flex; align-items:center; gap:5px; padding:7px 14px; font-size:12px; font-weight:600; border-radius:var(--r-md); cursor:pointer; font-family:var(--font); border:0.5px solid var(--bd2); background:var(--bg0); color:var(--tx0); transition:all .15s; white-space:nowrap; }
.btn:hover { background:var(--bg1); box-shadow:var(--shadow-sm); }
.btn:active { transform:scale(.98); }
.btn-primary { background:var(--blue); color:#fff; border-color:var(--blue); }
.btn-primary:hover { background:var(--blue2); }
.btn-success { background:var(--green); color:#fff; border-color:var(--green); }
.btn-success:hover { background:#27500A; }
.btn-danger { background:transparent; border-color:var(--red); color:var(--red); }
.btn-danger:hover { background:var(--bg-danger); }
.btn-warning { background:transparent; border-color:var(--amber); color:var(--amber); }
.btn-warning:hover { background:var(--bg-warning); }
.btn-sm { padding:5px 10px; font-size:11px; }
.btn[disabled] { opacity:.45; cursor:not-allowed; pointer-events:none; }

/* ─────────────────────────────────────────────────────────────
   FORMS
───────────────────────────────────────────────────────────── */
.form-input, .form-select, .form-textarea { width:100%; padding:9px 11px; font-size:13px; font-family:var(--font); border:1px solid rgba(0,0,0,.22); border-radius:var(--r-md); background:var(--bg0); color:var(--tx0); transition:border-color .15s; }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(40,87,206,.09); }
.form-input[readonly] { background:var(--bg1); color:var(--tx1); }
.form-hint { font-size:11px; color:var(--tx2); margin-top:4px; }
.form-row  { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }

/* ─────────────────────────────────────────────────────────────
   ALERTS
───────────────────────────────────────────────────────────── */
.alert { display:flex; align-items:flex-start; gap:10px; padding:11px 14px; border-radius:var(--r-md); font-size:13px; margin-bottom:14px; }
.alert-icon { font-size:15px; flex-shrink:0; margin-top:1px; }
.a-success { background:var(--bg-success); color:var(--tx-success); border:0.5px solid #b7d98a; }
.a-danger  { background:var(--bg-danger);  color:var(--tx-danger);  border:0.5px solid #f5b8b8; }
.a-warning { background:var(--bg-warning); color:var(--tx-warning); border:0.5px solid #f0cf9a; }
.a-info    { background:var(--bg-info);    color:var(--tx-info);    border:0.5px solid #a8c8ef; }

/* ─────────────────────────────────────────────────────────────
   TOOLBAR
───────────────────────────────────────────────────────────── */
.toolbar { display:flex; align-items:center; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
.toolbar-spacer { flex:1; }
.search-box { display:flex; align-items:center; gap:8px; padding:6px 12px; border:0.5px solid rgba(0,0,0,.2); border-radius:var(--r-md); background:var(--bg0); font-size:13px; color:var(--tx0); min-width:200px; }
.search-box input { border:none; outline:none; background:transparent; font-size:13px; font-family:var(--font); color:var(--tx0); width:100%; }
.filter-select { padding:6px 10px; font-size:12px; font-family:var(--font); border:0.5px solid rgba(0,0,0,.2); border-radius:var(--r-md); background:var(--bg0); color:var(--tx0); }

/* ─────────────────────────────────────────────────────────────
   TIMELINE
───────────────────────────────────────────────────────────── */
.tl { padding:4px 0; }
.tl-item { display:flex; gap:14px; margin-bottom:14px; }
.tl-dot-col { display:flex; flex-direction:column; align-items:center; }
.tl-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:4px; }
.tl-line { flex:1; width:2px; background:var(--bd); margin:5px auto 0; }
.tl-body { flex:1; padding-bottom:2px; }
.tl-title { font-size:13px; font-weight:500; color:var(--tx0); }
.tl-time  { font-size:11px; color:var(--tx2); margin-top:2px; }

/* ─────────────────────────────────────────────────────────────
   VERIFICATION PAGE
───────────────────────────────────────────────────────────── */
.verify-hero { max-width:680px; margin:0 auto 24px; text-align:center; padding:40px 24px 32px; }
.verify-hero h2 { font-size:22px; font-weight:700; margin-bottom:8px; }
.verify-hero p  { font-size:14px; color:var(--tx1); margin-bottom:24px; }
.verify-input-row { display:flex; gap:10px; max-width:580px; margin:0 auto; }
.verify-input-row input { flex:1; padding:11px 14px; font-size:14px; font-family:var(--font); border:1.5px solid rgba(0,0,0,.22); border-radius:var(--r-md); background:var(--bg0); color:var(--tx0); transition:border-color .15s; }
.verify-input-row input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(40,87,206,.09); }
.verify-hint { font-size:11px; color:var(--tx2); margin-top:8px; }
.verify-result { max-width:640px; margin:0 auto; }
.info-row { display:flex; padding:10px 0; border-bottom:0.5px solid var(--bd); font-size:13px; }
.info-row:last-child { border-bottom:none; }
.info-label { font-weight:600; color:var(--tx1); width:180px; flex-shrink:0; }
.info-value { color:var(--tx0); }
.chain { margin-top:4px; }
.chain-item { display:flex; align-items:flex-start; gap:14px; padding:10px 0; border-bottom:0.5px solid var(--bd); font-size:13px; }
.chain-item:last-child { border-bottom:none; }
.chain-num { width:22px; height:22px; border-radius:50%; background:var(--bg-info); color:var(--tx-info); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; margin-top:1px; }
.chain-detail { flex:1; }
.chain-route  { font-weight:600; color:var(--tx0); }
.chain-date   { font-size:11px; color:var(--tx2); margin-top:2px; }

/* ─────────────────────────────────────────────────────────────
   CODE + MISC
───────────────────────────────────────────────────────────── */
code { font-family:'SF Mono','Fira Mono','Courier New',monospace; font-size:11px; background:var(--bg1); padding:2px 6px; border-radius:4px; color:var(--tx1); }
.divider { height:0.5px; background:var(--bd); margin:14px 0; }
.section-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--tx2); margin-bottom:10px; }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
@media(max-width:700px){ .two-col{grid-template-columns:1fr;} }

/* ─────────────────────────────────────────────────────────────
   MODALS
───────────────────────────────────────────────────────────── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.42); z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(2px); }
.modal-overlay.open { display:flex; }
.modal-box { background:var(--bg0); border:0.5px solid var(--bd); border-radius:var(--r-xl); width:520px; max-width:95vw; max-height:88vh; overflow-y:auto; box-shadow:var(--shadow-lg); animation:fadeUp .2s ease; }
.modal-head { padding:16px 20px; border-bottom:0.5px solid var(--bd); display:flex; justify-content:space-between; align-items:center; background:var(--bg1); position:sticky; top:0; border-radius:var(--r-xl) var(--r-xl) 0 0; }
.modal-head h3 { font-size:15px; font-weight:700; display:flex; align-items:center; gap:8px; }
.modal-close { background:none; border:none; font-size:18px; cursor:pointer; color:var(--tx2); width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:6px; transition:background .15s; }
.modal-close:hover { background:var(--bg2); color:var(--tx0); }
.modal-body { padding:20px; }
.modal-foot { padding:14px 20px; border-top:0.5px solid var(--bd); display:flex; justify-content:flex-end; gap:10px; background:var(--bg1); border-radius:0 0 var(--r-xl) var(--r-xl); }

/* ─────────────────────────────────────────────────────────────
   TOAST
───────────────────────────────────────────────────────────── */
#toastArea { position:fixed; bottom:24px; right:24px; display:flex; flex-direction:column; gap:8px; z-index:9999; }
.toast { min-width:280px; max-width:380px; padding:12px 16px; border-radius:var(--r-md); font-size:13px; font-weight:500; display:flex; align-items:center; gap:10px; box-shadow:var(--shadow-lg); animation:slideIn .22s ease; transition:opacity .4s; }
@keyframes slideIn { from{transform:translateX(40px);opacity:0;} to{transform:translateX(0);opacity:1;} }
.t-success { background:var(--bg-success); color:var(--tx-success); border-left:4px solid var(--green); }
.t-danger  { background:var(--bg-danger);  color:var(--tx-danger);  border-left:4px solid var(--red); }

function handleEmailSubmit() {
  const emailInput = document.getElementById('userEmail');
  const email = emailInput.value.trim();
  const errorEl = document.getElementById('emailError');
  const hintEl  = document.getElementById('emailHint');

  // Basic validation
  const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  if (!valid) {
    emailInput.classList.add('error');
    errorEl.style.display = 'block';
    hintEl.style.display  = 'none';
    emailInput.focus();
    return;

  emailInput.classList.remove('error');

  const btnTxt = document.getElementById('gateBtnText');

  btnTxt.textContent = 'Sending…';

  const now = new Date();
  const timeStr = now.toLocaleString('en-IN', {
    timeZone: 'Asia/Kolkata',
    dateStyle: 'medium', timeStyle: 'short'
  });

  try {
    await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, {
      user_email:  email,
      login_time:  timeStr,
      time:        timeStr,
      message:     'New login on Agent Hero prototype from: ' + email,

      source: window.location.href,
      to_email:    EMAILJS_CONFIG.notifyEmail
    });
    console.info('[Agent Hero] Login notification sent for:', email);
  } catch (err) {
    console.warn('[Agent Hero] EmailJS send failed:', err);
    // Silently fail — user still gets through
  }
}

/* ── Navigation ── */
function pmsShow(viewId) {
  document.querySelectorAll('.pms-view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById(viewId);
  if (el) el.classList.add('active');

  document.querySelectorAll('.pms-nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === viewId);
  });
  document.querySelectorAll('.pms-sidebar-item').forEach(b => {
    b.classList.toggle('active', b.dataset.view === viewId);
  });
}

document.addEventListener('click', function(e) {
  const btn = e.target.closest('[data-view]');
  if (btn && (btn.classList.contains('pms-nav-btn') || btn.classList.contains('pms-sidebar-item'))) {
    pmsShow(btn.dataset.view);
  }
});

/* ── Reservations ── */
function renderReservations(data) {
  const statusClass = { 'Reserved':'ps-res','Checked In':'ps-in','Checked Out':'ps-out','Cancelled':'ps-cancel' };
  document.getElementById('pmsResTbody').innerHTML = data.map(r => `
    <tr>
      <td><code style="font-size:11px;">${r.id}</code></td>
      <td><strong>${r.guest}</strong></td>
      <td>${r.room}</td>
      <td>${r.ci}</td>
      <td>${r.co}</td>
      <td>${r.nights}</td>
      <td>₹${r.amount.toLocaleString()}</td>
      <td><span class="ps ${statusClass[r.status]||'ps-res'}">${r.status}</span></td>
      <td style="display:flex;gap:5px;">
        ${r.status==='Reserved' ? `<button class="pms-btn pms-btn-sm pms-btn-success" onclick="quickCheckin('${r.id}')">Check In</button>` : ''}
        ${r.status==='Checked In' ? `<button class="pms-btn pms-btn-sm" onclick="pmsToast('Folio opened for ${r.guest}','info')">Folio</button>` : ''}
        ${r.status==='Reserved' ? `<button class="pms-btn pms-btn-sm pms-btn-danger" onclick="cancelRes('${r.id}')">Cancel</button>` : ''}
      </td>
    </tr>`).join('');

function pmsFilterRes(q) {
  q = q.toLowerCase();
  renderReservations(PMS_RESERVATIONS.filter(r =>
    r.guest.toLowerCase().includes(q) || r.id.toLowerCase().includes(q) || r.room.includes(q)
  ));
}

function pmsFilterResStatus(s) {
  renderReservations(s ? PMS_RESERVATIONS.filter(r => r.status === s) : PMS_RESERVATIONS);
}

function quickCheckin(id) {
  const res = PMS_RESERVATIONS.find(r => r.id === id);
  if (res) { res.status = 'Checked In'; renderReservations(PMS_RESERVATIONS); renderInHouse(); pmsToast(`${res.guest} checked in to room ${res.room}`, 'success'); }
}

function cancelRes(id) {
  const res = PMS_RESERVATIONS.find(r => r.id === id);
  if (res) { res.status = 'Cancelled'; renderReservations(PMS_RESERVATIONS); pmsToast(`Reservation ${id} cancelled`, 'warning'); }
}

function pmsCreateReservation() {
  const name = document.getElementById('nrName').value.trim();
  const phone= document.getElementById('nrPhone').value.trim();
  const ci   = document.getElementById('nrCI').value;
  const co   = document.getElementById('nrCO').value;
  if (!name || !ci || !co) { pmsToast('Please fill all required fields', 'danger'); return; }
  const nights = Math.round((new Date(co)-new Date(ci))/(864e5));
  if (nights <= 0) { pmsToast('Check-out must be after check-in', 'danger'); return; }
  const rate = document.getElementById('nrRoomType').value === 'Suite' ? 8000 : document.getElementById('nrRoomType').value === 'Deluxe' ? 4200 : 3200;
  const newRes = {
    id: 'RES-' + String(PMS_RESERVATIONS.length+1).padStart(3,'0'),
    guest: name, phone, room: '—', type: document.getElementById('nrRoomType').value,
    ci, co, nights, amount: nights * rate, paid: 0, status: 'Reserved', balance: nights * rate
  };
  PMS_RESERVATIONS.unshift(newRes);
  renderReservations(PMS_RESERVATIONS);
  pmsCloseModal('pmsNewResModal');
  pmsToast(`Reservation ${newRes.id} created for ${name}`, 'success');
}

/* ── Calendar ── */
function renderCalendar() {
  const days = [];
  const today = new Date('2026-06-09');
  for (let i=0; i<7; i++) {
    const d = new Date(today); d.setDate(d.getDate()+i);
    days.push(d.toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short'}));
  }
  const rooms = ['101','204','211','302','312','405','502'];
  const bookings = {
    '101':['Occupied','Occupied','Occupied','Available','Available','Available','Available'],
    '204':['Reserved','Checked In','Checked In','Checked In','Available','Available','Available'],
    '211':['Due Out','Available','Available','Available','Available','Available','Available'],
    '302':['Dirty','Available','Available','Available','Available','Available','Available'],
    '312':['Checked In','Checked In','Available','Available','Reserved','Reserved','Reserved'],
    '405':['Checked In','Checked In','Checked In','Checked In','Available','Available','Available'],
    '502':['Available','Available','Available','Reserved','Reserved','Reserved','Available'],
  };
  const cellClass = {
    'Checked In':'rg-checkin','Reserved':'rg-booked','Due Out':'rg-checkout',
    'Occupied':'rg-booked','Dirty':'rg-maint','Available':'','Maintenance':'rg-maint'
  };
  let html = `<div class="room-grid">
    <div class="rg-header">Room</div>
    ${days.map(d=>`<div class="rg-header">${d}</div>`).join('')}`;
  rooms.forEach(rn => {
    const rm = PMS_ROOMS.find(r=>r.num===rn);
    html += `<div class="rg-room"><span>${rm?ROOM_STATUS_BADGE[rm.status]:'🟢'}</span>${rn}</div>`;
    (bookings[rn]||[]).forEach(s => {
      html += `<div class="rg-cell ${cellClass[s]||''}"><span class="rg-label">${s==='Available'?'':s}</span></div>`;
    });
  });
  html += '</div>';
  document.getElementById('calendarWrap').innerHTML = html;
}

function renderBarChart() {
  const vals = [92000, 110000, 87000, 143000, 128000, 155000, 140000];

  const max = Math.max(...vals);
  const bar = document.getElementById('pmsBarChart');
  const lbl = document.getElementById('pmsBarLabels');
  if (!bar) return;
  bar.innerHTML = vals.map((v,i) => `
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
      <div style="font-size:10px;color:#888;font-weight:600;">₹${(v/1000).toFixed(0)}k</div>
      <div style="width:100%;background:#2857ce;border-radius:4px 4px 0 0;height:${Math.round((v/max)*90)}px;transition:height .3s;"></div>
    </div>`).join('');
  lbl.innerHTML = labels.map(l=>`<div style="flex:1;text-align:center;">${l}</div>`).join('');
}

function login(role) {
  currentRole = role;
  const cfg = ROLES[role];

  document.getElementById('loginPage').style.display = 'none';
  const shell = document.getElementById('appShell');
  shell.style.display = 'flex';

  // Build topbar nav
  const nav = document.getElementById('topbarNav');
  nav.innerHTML = '';
  cfg.nav.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'tnav-item';
    btn.id = 'tn-' + item.view;
    btn.innerHTML = `<span class="tnav-icon">${item.icon}</span>${item.label}`;
    btn.onclick = () => showView(item.view, btn, item.label);
    nav.appendChild(btn);
  });

  // User chip — show email as name, role as label
  const av = document.getElementById('ucAvatar');
  av.textContent = cfg.initials;
  av.style.cssText = cfg.avatarStyle;
  // Show truncated email
  const shortEmail = currentUserEmail.length > 22
    ? currentUserEmail.substring(0, 20) + '…'
    : currentUserEmail;
  document.getElementById('ucName').textContent = shortEmail || cfg.org;
  const roleEl = document.getElementById('ucRole');
  roleEl.textContent = cfg.icon + ' ' + cfg.label;

  showView(first.view, document.getElementById('tn-' + first.view), first.label);
}

  document.getElementById('appShell').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';

  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

  if (vr) { vr.style.display = 'none'; vr.innerHTML = ''; }

}

/* ─────────────────────────────────────────────────────────────
   TOAST
───────────────────────────────────────────────────────────── */
function toast(msg, type = 'success') {
  const icons = { success:'✅', danger:'❌', warning:'⚠️', info:'ℹ️' };
  const el = document.createElement('div');
  el.className = `toast t-${type}`;
  el.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${msg}</span>`;
  document.getElementById('toastArea').appendChild(el);
  setTimeout(() => el.style.opacity = '0', 3600);
  setTimeout(() => el.remove(), 4000);
}

/* ─────────────────────────────────────────────────────────────
   MANUFACTURER ACTIONS
───────────────────────────────────────────────────────────── */
function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    const v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

function isValidUUID(uuid) {
  return /^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(uuid);
}

function createUnit() {
  const dt = document.getElementById('mfrDrugType').value;
  const expiry = document.getElementById('mfrExpiry').value;
  if (!dt) { toast('Please select a drug type with a valid license', 'danger'); return; }
  if (!expiry) { toast('Please select an expiration date', 'danger'); return; }
  const today = new Date().toISOString().split('T')[0];
  if (expiry <= today) { toast('Expiration date must be in the future', 'danger'); return; }
  const uuid = generateUUID();
  MEDICINE_DB[uuid] = {
    drugType: document.getElementById('mfrDrugType').options[document.getElementById('mfrDrugType').selectedIndex].text.split(' (')[0],
    manufacturer: 'PharmaCorp Ltd', owner: 'PharmaCorp Ltd (Manufacturer)',
    status: 'Active', expiry,
    licenseId: document.getElementById('mfrDrugType').options[document.getElementById('mfrDrugType').selectedIndex].getAttribute('data-license'),
    transfers: [{ from:'System', to:'PharmaCorp Ltd', action:'Created', date:today }]
  };
  MFR_UNITS[uuid] = { drugType: MEDICINE_DB[uuid].drugType, status: 'In Stock' };
  toast(`Unit created · UUID: ${uuid}`, 'success');
  document.getElementById('createdUUIDBox').style.display = 'block';
  document.getElementById('createdUUID').textContent = uuid;
}

function lookupUnit() {
  const uuid = document.getElementById('transferUUID').value.trim();
  const infoDiv  = document.getElementById('transferUnitInfo');
  const infoText = document.getElementById('transferUnitText');
  if (!uuid) { toast('Please enter a unit UUID', 'danger'); return; }
  const unit = MFR_UNITS[uuid];
  if (unit) {
    infoText.innerHTML = `<strong>${uuid}</strong> — ${unit.drugType} · Status: <strong>${unit.status}</strong>`;
    infoDiv.style.display = 'block';
  } else {
    infoDiv.style.display = 'none';
    toast('Unit not found or not owned by you', 'danger');
  }
}

function submitTransfer() {
  const ph = document.getElementById('transferTargetPharmacy').value;
  if (!ph) { toast('Please select a destination pharmacy', 'danger'); return; }
  toast(`Unit transferred to ${ph}. Audit trail updated.`, 'success');
  document.getElementById('transferUnitInfo').style.display = 'none';
  document.getElementById('transferUUID').value = '';
}

/* ─────────────────────────────────────────────────────────────
   PHARMACY ACTIONS
───────────────────────────────────────────────────────────── */
function phLookupUnit() {
  const uuid = document.getElementById('phUUID').value.trim();
  const infoDiv  = document.getElementById('phUnitInfo');
  const infoText = document.getElementById('phUnitInfoText');
  if (!uuid) { toast('Please enter a unit UUID', 'danger'); return; }
  if (!isValidUUID(uuid)) { toast('Invalid UUID format — must match xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx', 'danger'); return; }
  const prefix = uuid.split('-')[0];
  const shortMatch = Object.entries(PH_UNITS).find(([k]) => k === prefix);
  const fullMatch  = MEDICINE_DB[uuid];
  const unit = fullMatch || (shortMatch ? { drugType:shortMatch[1].drugType, status:shortMatch[1].status, expiry:shortMatch[1].expiry } : null);
  if (unit) {
    infoText.innerHTML = `Found: <strong>${unit.drugType}</strong> · Expiry: <strong>${unit.expiry || ''}</strong> · Status: <strong>${unit.status}</strong>`;
    infoDiv.style.display = 'block';
    document.getElementById('phDispenseBtn').dataset.uuid = uuid;
  } else {
    infoDiv.style.display = 'none';
    toast('Unit not found in your inventory', 'danger');
  }
}

function dispenseToCtizen() {
  const citizenId  = document.getElementById('phCitizenId').value.trim();
  const patientName= document.getElementById('phPatientName').value.trim();
  const btn  = document.getElementById('phDispenseBtn');
  const uuid = btn.dataset.uuid;
  if (!citizenId) { toast('Please enter a Citizen ID', 'danger'); return; }
  if (!uuid) { toast('Please look up a unit first', 'danger'); return; }
  const today = new Date().toISOString().split('T')[0];
  const displayName = patientName || citizenId;
  if (MEDICINE_DB[uuid]) {
    MEDICINE_DB[uuid].owner = `${displayName} (Citizen)`;
    MEDICINE_DB[uuid].status = 'Dispensed';
    MEDICINE_DB[uuid].transfers.push({ from:'City Health Pharmacy', to:displayName, action:'Dispensed', date:today });
    const prefix = uuid.split('-')[0];
    delete PH_UNITS[prefix];
  }
  toast(`Medicine dispensed to ${displayName}. Transfer recorded.`, 'success');
  document.getElementById('phUnitInfo').style.display = 'none';
  document.getElementById('phUUID').value = '';
  document.getElementById('phCitizenId').value = '';
  document.getElementById('phPatientName').value = '';
  btn.dataset.uuid = '';
}

/* ─────────────────────────────────────────────────────────────
   PUBLIC VERIFY
───────────────────────────────────────────────────────────── */
function verifyMed() {
  const uuid = document.getElementById('verificationUUID').value.trim();
  const resultDiv = document.getElementById('verificationResult');
  if (!uuid) { toast('Please enter a UUID', 'danger'); return; }

  if (!isValidUUID(uuid)) {
    resultDiv.innerHTML = `<div class="card" style="max-width:640px;margin:0 auto 20px;"><div class="card-body"><div class="alert a-danger" style="margin:0;"><span class="alert-icon">❌</span><div><strong>Invalid UUID format.</strong> Please enter a valid UUID in the format <code>xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx</code>.</div></div><div style="text-align:center;margin-top:16px;"><button class="btn btn-primary" onclick="document.getElementById('verificationUUID').value='';document.getElementById('verificationResult').style.display='none';">Try again</button></div></div></div>`;
    resultDiv.style.display = 'block';
    return;
  }

  const med = MEDICINE_DB[uuid];
  if (!med) {
    resultDiv.innerHTML = `<div class="card" style="max-width:640px;margin:0 auto 20px;"><div class="card-body"><div class="alert a-danger" style="margin:0;"><span class="alert-icon">❌</span><div><strong>No unit found for this code.</strong> Check the code and try again. If you believe this is a valid medicine, contact your pharmacy or regulatory authority immediately.</div></div><div style="text-align:center;margin-top:16px;"><button class="btn btn-primary" onclick="document.getElementById('verificationUUID').value='';document.getElementById('verificationResult').style.display='none';">Try again</button></div></div></div>`;
    resultDiv.style.display = 'block';
    return;
  }

  const statusMap = { Active:'p-active', Dispensed:'p-dispensed', 'In Stock':'p-stock' };
  const chainHTML = med.transfers.map((t, i) => `
    <div class="chain-item">
      <div class="chain-num">${i + 1}</div>
      <div class="chain-detail">
        <div class="chain-route">${t.from} → ${t.to}
          <span class="pill ${t.action==='Created'?'p-active':t.action==='Dispensed'?'p-dispensed':'p-info'}" style="margin-left:8px;">${t.action}</span>
        </div>
        <div class="chain-date">${t.date}</div>
      </div>
    </div>`).join('');

  resultDiv.innerHTML = `
    <div class="card" style="max-width:640px;margin:0 auto 20px;">
      <div class="card-head"><h2>✅ Verification Result</h2></div>
      <div class="card-body">
        <div class="alert a-success" style="margin-bottom:16px;"><span class="alert-icon">✅</span><div><strong>Verified!</strong> This medicine unit is authentic and traceable.</div></div>
        <div class="info-row"><div class="info-label">Unit ID</div><div class="info-value"><code>${uuid}</code></div></div>
        <div class="info-row"><div class="info-label">Drug type</div><div class="info-value">${med.drugType}</div></div>
        <div class="info-row"><div class="info-label">Status</div><div class="info-value"><span class="pill ${statusMap[med.status] || 'p-info'}">${med.status}</span></div></div>
        <div class="info-row"><div class="info-label">Current owner</div><div class="info-value">${med.owner}</div></div>
        <div class="info-row"><div class="info-label">Expiration</div><div class="info-value">${med.expiry}</div></div>
        <div class="divider"></div>
        <div style="font-weight:700;font-size:13px;margin-bottom:12px;">Transfer history</div>
        <div class="chain">${chainHTML}</div>
        <div style="text-align:center;margin-top:20px;">
          <button class="btn" onclick="document.getElementById('verificationUUID').value='';document.getElementById('verificationResult').style.display='none';">🔍 Verify another</button>
        </div>
      </div>
    </div>`;
  resultDiv.style.display = 'block';
}

/* ─────────────────────────────────────────────────────────────
   AUDIT EXPORT
───────────────────────────────────────────────────────────── */
function exportAuditCSV() {
  const rows = [['Timestamp','Event','Actor','Entity','Details']];
  document.querySelectorAll('#v-gov-audit .table tbody tr').forEach(tr => {
    const cells = Array.from(tr.querySelectorAll('td')).map(td => td.innerText.replace(/\n/g,' ').trim());
    rows.push(cells);
  });
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type:'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'audit-trail.csv';
  a.click();
  toast('Audit log exported as CSV', 'success');
}
